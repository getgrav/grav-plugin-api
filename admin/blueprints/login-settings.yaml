title: Login & Security
'@extends':
  context: blueprints://
  type: default

form:
  validation: loose
  fields:
    twofa_section:
      type: section
      title: Two-Factor Authentication
      underline: true

      fields:
        twofa_enabled:
          type: toggle
          label: Enable 2FA globally
          help: When enabled, users with 2FA configured on their account must enter a TOTP code after password login.
          highlight: 1
          default: 0
          options:
            1: Enabled
            0: Disabled
          validate:
            type: bool

    brute_force_section:
      type: section
      title: Brute Force Protection
      underline: true

      fields:
        max_login_count:
          type: number
          label: Max failed login attempts
          help: Number of failed login attempts allowed inside the tracking window before the account is locked out. Set to 0 for unlimited.
          validate:
            type: int
            min: 0

        max_login_interval:
          type: number
          label: Login attempt tracking window (minutes)
          help: Time window used to count failed login attempts.
          validate:
            type: int
            min: 1

        ipv6_subnet_size:
          type: number
          label: IPv6 subnet size
          help: Size of the IPv6 block treated as one "IP" when rate-limiting. 64 matches a typical residential /64 allocation.
          validate:
            type: int
            min: 0
            max: 128

    pw_reset_section:
      type: section
      title: Password Reset
      underline: true

      fields:
        max_pw_resets_count:
          type: number
          label: Max password reset requests
          help: Number of password reset emails allowed per user inside the tracking window. Set to 0 for unlimited.
          validate:
            type: int
            min: 0

        max_pw_resets_interval:
          type: number
          label: Reset request tracking window (minutes)
          help: Time window used to count password reset requests.
          validate:
            type: int
            min: 1
